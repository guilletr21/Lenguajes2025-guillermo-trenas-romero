<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tablero de Ajedrez Guillermo trenas romero</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>Tablero de Ajedrez Guillermo trenas romero</h1>
</header>

<main>

    <div class="contenedor-tablero">
        <table class="tablero">

            <!-- Fila de cabeceras (A–H) -->
            <tr>
                <th></th>
                <th>A</th><th>B</th><th>C</th><th>D</th>
                <th>E</th><th>F</th><th>G</th><th>H</th>
            </tr>

            <!-- FILA 8 – PIEZAS NEGRAS -->
            <tr>
                <th>8</th>
                <td id="A8" class="negro"><img src="piezas/torre_negra.png"></td>
                <td id="B8" class="blanco"><img src="piezas/caballo_negro.png"></td>
                <td id="C8" class="negro"><img src="piezas/alfil_negro.png"></td>
                <td id="D8" class="blanco"><img src="piezas/reina_negra.png"></td>
                <td id="E8" class="negro"><img src="piezas/rey_negro.png"></td>
                <td id="F8" class="blanco"><img src="piezas/alfil_negro.png"></td>
                <td id="G8" class="negro"><img src="piezas/caballo_negro.png"></td>
                <td id="H8" class="blanco"><img src="piezas/torre_negra.png"></td>
            </tr>

            <!-- FILA 7 – PEONES NEGROS -->
            <tr>
                <th>7</th>
                <td class="blanco"><img src="piezas/peon_negro.png"></td>
                <td class="negro"><img src="piezas/peon_negro.png"></td>
                <td class="blanco"><img src="piezas/peon_negro.png"></td>
                <td class="negro"><img src="piezas/peon_negro.png"></td>
                <td class="blanco"><img src="piezas/peon_negro.png"></td>
                <td class="negro"><img src="piezas/peon_negro.png"></td>
                <td class="blanco"><img src="piezas/peon_negro.png"></td>
                <td class="negro"><img src="piezas/peon_negro.png"></td>
            </tr>

            <!-- FILAS 6 – 3 (VACÍAS) -->
            <tr>
                <th>6</th>
                <td class="negro"></td><td class="blanco"></td><td class="negro"></td><td class="blanco"></td>
                <td class="negro"></td><td class="blanco"></td><td class="negro"></td><td class="blanco"></td>
            </tr>
            <tr>
                <th>5</th>
                <td class="blanco"></td><td class="negro"></td><td class="blanco"></td><td class="negro"></td>
                <td class="blanco"></td><td class="negro"></td><td class="blanco"></td><td class="negro"></td>
            </tr>
            <tr>
                <th>4</th>
                <td class="negro"></td><td class="blanco"></td><td class="negro"></td><td class="blanco"></td>
                <td class="negro"></td><td class="blanco"></td><td class="negro"></td><td class="blanco"></td>
            </tr>
            <tr>
                <th>3</th>
                <td class="blanco"></td><td class="negro"></td><td class="blanco"></td><td class="negro"></td>
                <td class="blanco"></td><td class="negro"></td><td class="blanco"></td><td class="negro"></td>
            </tr>

            <!-- FILA 2 – PEONES BLANCOS -->
            <tr>
                <th>2</th>
                <td class="negro"><img src="piezas/peon_blanco.png"></td>
                <td class="blanco"><img src="piezas/peon_blanco.png"></td>
                <td class="negro"><img src="piezas/peon_blanco.png"></td>
                <td class="blanco"><img src="piezas/peon_blanco.png"></td>
                <td class="negro"><img src="piezas/peon_blanco.png"></td>
                <td class="blanco"><img src="piezas/peon_blanco.png"></td>
                <td class="negro"><img src="piezas/peon_blanco.png"></td>
                <td class="blanco"><img src="piezas/peon_blanco.png"></td>
            </tr>

            <!-- FILA 1 – PIEZAS BLANCAS -->
            <tr>
                <th>1</th>
                <td id="A1" class="blanco"><img src="piezas/torre_blanca.png"></td>
                <td id="B1" class="negro"><img src="piezas/caballo_blanco.png"></td>
                <td id="C1" class="blanco"><img src="piezas/alfil_blanco.png"></td>
                <td id="D1" class="negro"><img src="piezas/reina_blanca.png"></td>
                <td id="E1" class="blanco"><img src="piezas/rey_blanco.png"></td>
                <td id="F1" class="negro"><img src="piezas/alfil_blanco.png"></td>
                <td id="G1" class="blanco"><img src="piezas/caballo_blanco.png"></td>
                <td id="H1" class="negro"><img src="piezas/torre_blanca.png"></td>
            </tr>

        </table>
    </div>

</main>

<footer>
    <p>© 2025 – Proyecto de diseño web • Ajedrez</p>
</footer>

</body>
</html>
